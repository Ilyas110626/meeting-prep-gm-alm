<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подготовка к встречам · GM / ALM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ec; --panel:#fbfaf6; --panel-2:#f0eee6;
    --ink:#1a1d21; --ink-soft:#4c5258; --ink-mute:#878d92;
    --line:#e2ddd1; --line-strong:#cfc8b8;
    --gm:#b85c38; --gm-soft:#f3e4dc; --gm-ink:#8f4022;
    --alm:#1f7a6e; --alm-soft:#dcefec; --alm-ink:#155b52;
    --crit:#c1352b; --crit-soft:#f6e0de;
    --warn:#b67410; --warn-soft:#f6ecd6;
    --live:#1f7a6e;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(26,29,33,.05),0 8px 24px rgba(26,29,33,.06);
    --sans:'Inter',system-ui,sans-serif;
    --disp:'Space Grotesk',var(--sans);
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gm-soft)}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:20;
    background:#14171c;color:#eceae3;
    border-bottom:1px solid #000;
  }
  .head-in{
    max-width:980px;margin:0 auto;padding:14px 22px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
  .brand .t{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:.2px;line-height:1.1}
  .brand .s{font-size:11.5px;color:#9aa0a6;letter-spacing:.3px;text-transform:uppercase}
  .clock{
    font-family:var(--mono);text-align:right;line-height:1.2;
  }
  .clock .time{font-size:19px;font-weight:600;letter-spacing:1px}
  .clock .date{font-size:11.5px;color:#9aa0a6;text-transform:capitalize}

  /* ---------- Layout ---------- */
  main{max-width:980px;margin:0 auto;padding:26px 22px 80px}
  .toolbar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    margin-bottom:18px;
  }
  .tabs{display:flex;gap:6px;background:var(--panel-2);padding:4px;border-radius:11px;border:1px solid var(--line)}
  .tab{
    border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-soft);
    padding:7px 13px;border-radius:8px;display:flex;align-items:center;gap:7px;
    transition:background .15s,color .15s;
  }
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .tab .cnt{
    font-family:var(--mono);font-size:11px;font-weight:600;
    background:var(--line);color:var(--ink-soft);
    padding:1px 6px;border-radius:20px;min-width:20px;text-align:center;
  }
  .tab[data-div="gm"] .dot,.tab[data-div="alm"] .dot{width:8px;height:8px;border-radius:50%}
  .tab[data-div="gm"] .dot{background:var(--gm)}
  .tab[data-div="alm"] .dot{background:var(--alm)}

  .btn{
    font-family:var(--sans);font-weight:600;font-size:13.5px;cursor:pointer;
    border-radius:10px;padding:10px 16px;border:1px solid transparent;
    display:inline-flex;align-items:center;gap:8px;transition:filter .15s,background .15s;
  }
  .btn-primary{background:var(--ink);color:#fff;margin-left:auto}
  .btn-primary:hover{filter:brightness(1.15)}
  .btn-ghost{background:var(--panel);border-color:var(--line-strong);color:var(--ink-soft)}
  .btn-ghost:hover{color:var(--ink);background:var(--panel-2)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}

  /* ---------- Meeting card ---------- */
  .list{display:flex;flex-direction:column;gap:13px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;position:relative;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .card[data-div="gm"]::before{background:var(--gm)}
  .card[data-div="alm"]::before{background:var(--alm)}

  .card-head{
    display:grid;grid-template-columns:1fr auto;gap:14px;
    padding:16px 18px 16px 22px;cursor:pointer;align-items:start;
  }
  .card-head:focus-visible{outline:2px solid var(--ink);outline-offset:-2px}
  .ttl-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .div-tag{
    font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    padding:3px 8px;border-radius:6px;font-family:var(--sans);
  }
  .div-tag.gm{background:var(--gm-soft);color:var(--gm-ink)}
  .div-tag.alm{background:var(--alm-soft);color:var(--alm-ink)}
  .card h3{font-family:var(--disp);font-weight:600;font-size:16.5px;margin:0;line-height:1.25}
  .ex-badge{font-size:11px;color:var(--ink-mute);font-weight:500;font-family:var(--sans)}
  .meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:7px;color:var(--ink-soft);font-size:12.5px}
  .meta span{display:inline-flex;align-items:center;gap:5px}
  .meta .ic{opacity:.55}

  .cd-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:7px;min-width:120px}
  .cd{
    font-family:var(--mono);font-size:13px;font-weight:600;
    padding:6px 11px;border-radius:8px;white-space:nowrap;letter-spacing:.2px;
    border:1px solid transparent;text-align:right;
  }
  .cd.neutral{background:var(--panel-2);color:var(--ink-soft);border-color:var(--line)}
  .cd.warn{background:var(--warn-soft);color:var(--warn);border-color:#e7d3a6}
  .cd.crit{background:var(--crit-soft);color:var(--crit);border-color:#eebcb8}
  .cd.live{background:var(--alm-soft);color:var(--live);border-color:#aed9d2}
  .cd.muted{background:transparent;color:var(--ink-mute);border-color:var(--line)}
  .cd.crit::before,.cd.live::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;margin-right:6px;vertical-align:1px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .chev{color:var(--ink-mute);transition:transform .2s;flex:none}
  .card.open .chev{transform:rotate(90deg)}

  /* ---------- Plan ---------- */
  .plan{display:none;border-top:1px solid var(--line);padding:6px 18px 18px 22px;background:var(--panel-2)}
  .card.open .plan{display:block}
  .plan-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 0 6px}
  .plan-note{
    font-size:11.5px;color:var(--warn);background:var(--warn-soft);
    padding:3px 9px;border-radius:6px;font-weight:500;border:1px solid #e7d3a6;
  }
  .plan-spacer{margin-left:auto;display:flex;gap:8px}
  .modules{font-size:11.5px;color:var(--ink-mute)}
  .modules b{color:var(--ink-soft);font-weight:600}

  .block{display:grid;grid-template-columns:34px 1fr;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .block:first-of-type{border-top:0}
  .b-num{
    font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;
    background:var(--ink);width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
  }
  .card[data-div="gm"] .b-num{background:var(--gm)}
  .card[data-div="alm"] .b-num{background:var(--alm)}
  .b-body h4{margin:3px 0 7px;font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:.2px}
  .b-body p{margin:0;font-size:13.5px;color:var(--ink-soft)}
  .b-body ul{margin:0;padding-left:18px}
  .b-body li{font-size:13.5px;color:var(--ink-soft);margin:4px 0}
  .b-body li.mod::marker{color:var(--gm)}
  .card[data-div="alm"] .b-body li.mod::marker{color:var(--alm)}
  .b-body li .mtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-mute);margin-left:6px}

  /* ---------- Empty ---------- */
  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-mute);
    border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:var(--panel)
  }
  .empty h3{font-family:var(--disp);color:var(--ink-soft);margin:0 0 6px}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,23,28,.55);display:none;z-index:40;backdrop-filter:blur(2px)}
  .scrim.show{display:flex;align-items:flex-start;justify-content:center;padding:40px 18px;overflow:auto}
  .modal{
    background:var(--panel);border-radius:16px;width:100%;max-width:520px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);border:1px solid var(--line);
  }
  .modal-head{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .modal-head h2{font-family:var(--disp);font-weight:600;font-size:18px;margin:0}
  .x{border:0;background:var(--panel-2);width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--ink-soft);font-size:16px}
  .x:hover{background:var(--line)}
  form{padding:18px 22px 22px;display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:.2px}
  .field input,.field textarea,.field select{
    font-family:var(--sans);font-size:14px;color:var(--ink);
    border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;background:#fff;
    width:100%;transition:border-color .15s,box-shadow .15s;
  }
  .field textarea{resize:vertical;min-height:64px}
  .field input:focus,.field textarea:focus,.field select:focus{
    outline:0;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,29,33,.08)
  }
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .seg{display:flex;gap:8px}
  .seg input{position:absolute;opacity:0;pointer-events:none}
  .seg label{
    flex:1;text-align:center;border:1px solid var(--line-strong);border-radius:9px;
    padding:10px;cursor:pointer;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;
    transition:all .15s;
  }
  .seg .dot{width:9px;height:9px;border-radius:50%}
  .seg label[data-div="gm"] .dot{background:var(--gm)}
  .seg label[data-div="alm"] .dot{background:var(--alm)}
  .seg input:checked + label[data-div="gm"]{border-color:var(--gm);background:var(--gm-soft);color:var(--gm-ink)}
  .seg input:checked + label[data-div="alm"]{border-color:var(--alm);background:var(--alm-soft);color:var(--alm-ink)}
  .form-foot{display:flex;gap:10px;margin-top:4px}
  .form-foot .btn-primary{margin-left:auto}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.25)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .icon-del{border:0;background:transparent;cursor:pointer;color:var(--ink-mute);padding:5px;border-radius:7px;line-height:0}
  .icon-del:hover{background:var(--crit-soft);color:var(--crit)}

  @media (max-width:640px){
    .card-head{grid-template-columns:1fr}
    .cd-wrap{flex-direction:row;align-items:center;justify-content:space-between;width:100%}
    .row{grid-template-columns:1fr}
    .clock .time{font-size:16px}
    .brand{width:100%}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }
  svg{flex:none}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <span class="t">Подготовка к встречам</span>
      <span class="s">Global Markets · ALM — Режим A</span>
    </div>
    <div class="clock">
      <div class="time" id="clkTime">—</div>
      <div class="date" id="clkDate">—</div>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="tabs" role="tablist" aria-label="Фильтр по направлению">
      <button class="tab" role="tab" data-div="all" aria-selected="true">Все <span class="cnt" id="cAll">0</span></button>
      <button class="tab" role="tab" data-div="gm" aria-selected="false"><span class="dot"></span>Global Markets <span class="cnt" id="cGm">0</span></button>
      <button class="tab" role="tab" data-div="alm" aria-selected="false"><span class="dot"></span>ALM <span class="cnt" id="cAlm">0</span></button>
    </div>
    <button class="btn btn-primary" id="addBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Встреча
    </button>
  </div>

  <div class="list" id="list"></div>
</main>

<!-- Modal -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <div class="modal-head">
      <h2 id="mTitle">Новая встреча</h2>
      <button class="x" id="closeM" aria-label="Закрыть">✕</button>
    </div>
    <form id="form">
      <div class="field">
        <label for="f-title">Тема встречи</label>
        <input id="f-title" required placeholder="Напр.: ALCO — обзор ликвидности и IRRBB" autocomplete="off">
      </div>
      <div class="field">
        <label>Направление</label>
        <div class="seg">
          <input type="radio" name="div" id="d-gm" value="gm" checked>
          <label for="d-gm" data-div="gm"><span class="dot"></span>Global Markets</label>
          <input type="radio" name="div" id="d-alm" value="alm">
          <label for="d-alm" data-div="alm"><span class="dot"></span>ALM</label>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="f-date">Дата</label>
          <input id="f-date" type="date" required>
        </div>
        <div class="field">
          <label for="f-time">Время</label>
          <input id="f-time" type="time" required>
        </div>
      </div>
      <div class="field">
        <label for="f-att">Участники / контрагент <span style="color:var(--ink-mute);font-weight:400">— необязательно</span></label>
        <input id="f-att" placeholder="Напр.: Комитет ALCO, риск-менеджмент" autocomplete="off">
      </div>
      <div class="field">
        <label for="f-notes">Заметки <span style="color:var(--ink-mute);font-weight:400">— уточняют генерацию плана</span></label>
        <textarea id="f-notes" placeholder="Ключевые слова темы: ликвидность, IRRBB, FX, ставки, фондирование…"></textarea>
      </div>
      <div class="form-foot">
        <button type="button" class="btn btn-ghost" id="cancelM">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ Storage (localStorage + memory fallback) ============ */
const KEY = "mp_meetings_v1";
const store = (() => {
  let mem = null, ok = true;
  try { const t="__t"; localStorage.setItem(t,"1"); localStorage.removeItem(t); }
  catch(e){ ok=false; }
  return {
    load(){
      if(ok){ try{ return JSON.parse(localStorage.getItem(KEY)||"null"); }catch(e){} }
      return mem;
    },
    save(v){
      if(ok){ try{ localStorage.setItem(KEY,JSON.stringify(v)); return; }catch(e){} }
      mem = v;
    },
    seeded(){ return ok ? localStorage.getItem(KEY)!==null : mem!==null; }
  };
})();

/* ============ Knowledge base — base plans + thematic modules ============ */
const DIV = {
  gm:{ label:"Global Markets", short:"GM",
    base:{
      data:[
        "Снимок рынка на дату встречи: FX, ставки, ключевые индексы и их изменения",
        "Календарь рыночных событий и публикаций на горизонт встречи",
        "Текущее позиционирование портфеля и клиентские потоки",
        "Риск-метрики и P&L за отчётный период"
      ],
      materials:[
        "Однослайдовый рыночный обзор с ключевыми уровнями",
        "Таблица уровней и изменений (Δ день / Δ неделя)",
        "Краткие тезисы по позиционированию и взгляду на рынок"
      ],
      scenarios:[
        "Базовый и риск-сценарий движения рынка к дате встречи",
        "Вероятные вопросы по позициям, лимитам и P&L",
        "Триггеры пересмотра позиции и стоп-уровни"
      ],
      rec:"Сформулировать рыночный взгляд (направление/нейтрально), увязать с позиционированием и обозначить уровни-триггеры пересмотра."
    }
  },
  alm:{ label:"Asset & Liabilities Management", short:"ALM",
    base:{
      data:[
        "Структура баланса (активы / обязательства) на дату",
        "Нормативы ликвидности LCR / NSFR: факт против лимита",
        "Профиль процентного риска IRRBB: ΔEVE и ΔNII",
        "Структура и стоимость фондирования (FTP)"
      ],
      materials:[
        "Сводка нормативов и регуляторных буферов",
        "Гэп-таблицы: ликвидности и репрайсинга по срокам",
        "Тезисы по стоимости и устойчивости фондирования"
      ],
      scenarios:[
        "Сценарии шоков ставок ±200 б.п. (влияние на EVE / NII)",
        "Стресс ликвидности: отток депозитов / закрытие рынков",
        "Вопросы по соблюдению нормативов, лимитов и буферов"
      ],
      rec:"Подтвердить соответствие нормативам с запасом, обозначить чувствительность к ставкам/ликвидности и предложить действия по фондированию."
    }
  }
};

const MODULES = [
  // ---- Global Markets ----
  {div:"gm",label:"FX / валютный рынок",kw:["fx","валют","курс","usd","kzt","доллар","eur","евро","forex","тенге"],
   data:["USD/KZT спот и форвардные пункты; динамика реального курса","Объём продаж валютной выручки и интервенции регулятора","Валютная позиция и чувствительность к движению курса"]},
  {div:"gm",label:"Ставки / облигации",kw:["ставк","облигац","гцб","доходност","бонд","bond","yield","кривая","дюрац","свопы","rates"],
   data:["Кривая доходности ГЦБ: короткий и длинный конец, наклон","Базовая ставка и рыночные ожидания по траектории","Календарь аукционов Минфина и спреды к свопам"]},
  {div:"gm",label:"Кредит / спреды",kw:["кредит","спред","cds","рейтинг","credit","эмитент"],
   data:["Динамика кредитных спредов и CDS ключевых эмитентов","Кредитные рейтинги и пересмотры прогнозов","Активность первичного рынка размещений"]},
  {div:"gm",label:"Акции / индексы",kw:["акци","equity","индекс","kase","фонд"],
   data:["Динамика индекса KASE и ликвидных бумаг","Потоки нерезидентов и крупных участников","Дивидендный и корпоративный календарь"]},
  {div:"gm",label:"Товарные рынки",kw:["нефт","brent","urals","товар","commodit","металл","золото","oil"],
   data:["Brent / Urals и дисконт; влияние на платёжный баланс","Транзит и эффект на тенге через нефтегазовый экспорт","Цены на ключевые металлы экспортной корзины"]},
  {div:"gm",label:"Волатильность / риск",kw:["волатильн","vol","var","стресс","риск"],
   data:["Реализованная и вменённая волатильность по ключевым активам","VaR по портфелю и утилизация лимитов","Стресс-сценарии и хеджи"]},
  // ---- ALM ----
  {div:"alm",label:"Ликвидность (LCR/NSFR)",kw:["ликвидн","lcr","nsfr","hqla","кэш","cash","буфер"],
   data:["LCR и NSFR: факт против норматива и внутреннего лимита","Запас HQLA и его качество (уровни 1 / 2)","Разрывы ликвидности по срочным корзинам; план фондирования"]},
  {div:"alm",label:"Процентный риск (IRRBB)",kw:["irrbb","процентн","eve","nii","репрайс","дюрац","gap","гэп"],
   data:["ΔEVE и ΔNII при стандартных шоках ±200 б.п.","Гэп репрайсинга по временным корзинам","Дюрация активов и обязательств; влияние на капитал"]},
  {div:"alm",label:"Фондирование / FTP",kw:["фондир","ftp","привлечени","заём","ноты","funding","трансферт"],
   data:["Структура и средневзвешенная стоимость фондирования","FTP-кривая и стоимость предельного фондирования","Концентрация источников и сроки погашения"]},
  {div:"alm",label:"Депозиты / клиентские средства",kw:["депозит","вклад","клиентск","отток","deposit"],
   data:["Динамика и структура депозитной базы","Бета депозитов и поведенческие сроки (core/non-core)","Концентрация крупных вкладчиков"]},
  {div:"alm",label:"Капитал / достаточность",kw:["капитал","достаточност","rwa","базель","basel","k1","k2"],
   data:["Коэффициенты достаточности капитала и буферы","Динамика RWA и влияние роста баланса","Сценарии давления на капитал"]},
  {div:"alm",label:"Структура баланса",kw:["баланс","актив","обязательств","структур"],
   data:["Структура и динамика активов / обязательств","Концентрации и срочность по статьям","Эффект планируемых операций на баланс"]}
];

/* ============ Plan generation ============ */
function buildPlan(m){
  const d = DIV[m.div];
  const hay = ((m.title||"") + " " + (m.notes||"")).toLowerCase();
  const matched = MODULES.filter(mod => mod.div===m.div && mod.kw.some(k=>hay.includes(k)));
  const general = matched.length===0;

  // block 0 — context
  const when = fmtFull(parseDT(m.dt));
  let ctx = `Встреча по направлению «${d.label}»`;
  ctx += m.att ? `, участники: ${m.att}.` : ".";
  ctx += ` Запланирована на ${when}.`;
  ctx += ` Цель — прийти с актуальной картиной, выверенными цифрами и обоснованной позицией.`;
  if(m.notes) ctx += ` Контекст: ${m.notes}.`;

  // assemble data lines: base + module specifics
  const dataItems = d.base.data.map(t=>({t,mod:false}));
  matched.forEach(mod => mod.data.forEach(t => dataItems.push({t,mod:true,tag:mod.label})));

  return {
    general,
    matched,
    blocks:[
      {n:0,h:"Контекст и цель",type:"p",body:ctx},
      {n:1,h:"Ключевые данные к сбору",type:"ul",items:dataItems},
      {n:2,h:"Материалы к подготовке",type:"ul",items:d.base.materials.map(t=>({t,mod:false}))},
      {n:3,h:"Сценарии и вопросы",type:"ul",items:d.base.scenarios.map(t=>({t,mod:false}))},
      {n:4,h:"Рекомендуемая позиция / итог",type:"p",body:d.base.rec}
    ]
  };
}

/* ============ Date / countdown helpers ============ */
function parseDT(s){ // "YYYY-MM-DDTHH:mm" local
  const [d,t]=s.split("T"); const [Y,M,D]=d.split("-").map(Number); const [h,mi]=t.split(":").map(Number);
  return new Date(Y,M-1,D,h,mi,0,0);
}
const RU_DAYS=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
const RU_MON=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
function pad(n){return String(n).padStart(2,"0");}
function fmtFull(dt){
  return `${RU_DAYS[dt.getDay()]}, ${dt.getDate()} ${RU_MON[dt.getMonth()]} ${dt.getFullYear()}, ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}
function fmtShortDate(dt){ return `${dt.getDate()} ${RU_MON[dt.getMonth()]}`; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function countdown(dt, now){
  const diff = dt - now; // ms
  const min = Math.round(diff/60000);
  const ONGOING = 90; // minutes window considered "в процессе"
  if(diff <= 0){
    if(min > -ONGOING) return {text:"идёт сейчас",cls:"live"};
    return {text:"завершена",cls:"muted"};
  }
  if(min < 60){
    return {text:`через ${min} мин`,cls:"crit"};
  }
  if(sameDay(dt,now)){
    const h=Math.floor(min/60), mm=min%60;
    return {text:`сегодня · через ${h} ч ${pad(mm)} мин`,cls:"warn"};
  }
  const tmr=new Date(now); tmr.setDate(now.getDate()+1);
  if(sameDay(dt,tmr)){
    return {text:`завтра в ${pad(dt.getHours())}:${pad(dt.getMinutes())}`,cls:"neutral"};
  }
  const days=Math.ceil((dt - new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
  return {text:`через ${days} дн`,cls:"neutral"};
}

/* ============ State ============ */
let meetings = [];
let filter = "all";
const openIds = new Set();

function uid(){ return "m"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function seed(){
  const now=new Date();
  const a=new Date(now); a.setHours(now.getHours()+3, 0,0,0);
  const b=new Date(now); b.setDate(now.getDate()+2); b.setHours(10,0,0,0);
  const toDT=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return [
    {id:uid(),title:"Рыночный обзор — FX и ставки",div:"gm",dt:toDT(a),
     att:"Управление Global Markets",notes:"USD/KZT, кривая доходности ГЦБ, волатильность",ex:true},
    {id:uid(),title:"ALCO — ликвидность, IRRBB и фондирование",div:"alm",dt:toDT(b),
     att:"Комитет ALCO, риск-менеджмент",notes:"LCR/NSFR, EVE/NII, стоимость фондирования FTP",ex:true}
  ];
}

/* ============ Render ============ */
const $=s=>document.querySelector(s);
const listEl=$("#list");

function counts(){
  return { all:meetings.length, gm:meetings.filter(m=>m.div==="gm").length, alm:meetings.filter(m=>m.div==="alm").length };
}

function render(){
  const now=new Date();
  const c=counts();
  $("#cAll").textContent=c.all; $("#cGm").textContent=c.gm; $("#cAlm").textContent=c.alm;

  let items=[...meetings].sort((a,b)=>parseDT(a.dt)-parseDT(b.dt));
  if(filter!=="all") items=items.filter(m=>m.div===filter);

  if(items.length===0){
    listEl.innerHTML=`<div class="empty"><h3>Встреч нет</h3><p>${meetings.length===0?"Добавьте первую встречу — для неё автоматически сформируется план подготовки.":"В этой вкладке нет встреч. Переключите фильтр или добавьте встречу."}</p></div>`;
    return;
  }

  listEl.innerHTML = items.map(m=>{
    const dt=parseDT(m.dt);
    const cd=countdown(dt,now);
    const isOpen=openIds.has(m.id);
    const plan=isOpen?buildPlan(m):null;
    return `
    <article class="card ${isOpen?'open':''}" data-div="${m.div}" data-id="${m.id}">
      <div class="card-head" role="button" tabindex="0" aria-expanded="${isOpen}" data-act="toggle">
        <div>
          <div class="ttl-row">
            <span class="div-tag ${m.div}">${DIV[m.div].short}</span>
            <h3>${esc(m.title)}</h3>
            ${m.ex?'<span class="ex-badge">(пример)</span>':''}
          </div>
          <div class="meta">
            <span><svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>${fmtShortDate(dt)} · ${pad(dt.getHours())}:${pad(dt.getMinutes())}</span>
            ${m.att?`<span><svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>${esc(m.att)}</span>`:''}
          </div>
        </div>
        <div class="cd-wrap">
          <span class="cd ${cd.cls}">${cd.text}</span>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
      ${isOpen?renderPlan(m,plan):''}
    </article>`;
  }).join("");
}

function renderPlan(m,plan){
  const mods = plan.matched.map(x=>x.label).join(", ");
  return `<div class="plan">
    <div class="plan-bar">
      ${plan.general
        ? `<span class="plan-note">Общий план направления</span><span class="modules">Ключевые слова темы не распознаны — используется базовый чек-лист «${esc(DIV[m.div].label)}».</span>`
        : `<span class="modules">Распознанные модули: <b>${esc(mods)}</b></span>`}
      <span class="plan-spacer">
        <button class="btn btn-ghost btn-sm" data-act="copy">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          Копировать план
        </button>
        <button class="icon-del" data-act="del" aria-label="Удалить встречу" title="Удалить">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </span>
    </div>
    ${plan.blocks.map(b=>`
      <div class="block">
        <div class="b-num">${b.n}</div>
        <div class="b-body">
          <h4>${b.h}</h4>
          ${b.type==="p"
            ? `<p>${esc(b.body)}</p>`
            : `<ul>${b.items.map(it=>`<li class="${it.mod?'mod':''}">${esc(it.t)}${it.mod?`<span class="mtag">${esc(it.tag)}</span>`:''}</li>`).join("")}</ul>`}
        </div>
      </div>`).join("")}
  </div>`;
}

function planText(m){
  const plan=buildPlan(m);
  const dt=parseDT(m.dt);
  let out=`ПЛАН ПОДГОТОВКИ К ВСТРЕЧЕ\n`;
  out+=`${m.title} [${DIV[m.div].label}]\n`;
  out+=`${fmtFull(dt)}\n`;
  if(m.att) out+=`Участники: ${m.att}\n`;
  out+=plan.general?`(общий план направления)\n`:`Модули: ${plan.matched.map(x=>x.label).join(", ")}\n`;
  out+=`\n`;
  plan.blocks.forEach(b=>{
    out+=`(${b.n}) ${b.h.toUpperCase()}\n`;
    if(b.type==="p") out+=`${b.body}\n`;
    else b.items.forEach(it=>{ out+=`  • ${it.t}${it.mod?` [${it.tag}]`:''}\n`; });
    out+=`\n`;
  });
  out+=`— Цифры являются ориентирами и требуют актуализации перед встречей.\n`;
  return out;
}

/* ============ Helpers ============ */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function persist(){ store.save(meetings); }
let toastT;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1900);
}
async function copy(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try{ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); return true; }catch(_){ return false; }
  }
}

/* ============ Events ============ */
listEl.addEventListener("click",e=>{
  const card=e.target.closest(".card"); if(!card) return;
  const id=card.dataset.id;
  const act=e.target.closest("[data-act]")?.dataset.act;
  if(act==="copy"){ const m=meetings.find(x=>x.id===id); copy(planText(m)).then(ok=>toast(ok?"План скопирован в буфер":"Не удалось скопировать")); return; }
  if(act==="del"){ const m=meetings.find(x=>x.id===id);
    if(confirm(`Удалить встречу «${m.title}»?`)){ meetings=meetings.filter(x=>x.id!==id); openIds.delete(id); persist(); render(); toast("Встреча удалена"); }
    return; }
  if(act==="toggle"){ openIds.has(id)?openIds.delete(id):openIds.add(id); render(); }
});
listEl.addEventListener("keydown",e=>{
  if((e.key==="Enter"||e.key===" ")&&e.target.dataset.act==="toggle"){ e.preventDefault(); e.target.click(); }
});

/* tabs */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  filter=t.dataset.div;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected", x===t));
  render();
}));

/* modal */
const scrim=$("#scrim"), form=$("#form");
function openModal(){
  form.reset();
  const now=new Date(); now.setMinutes(0,0,0); now.setHours(now.getHours()+1);
  $("#f-date").value=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  $("#f-time").value=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  $("#d-gm").checked=true;
  scrim.classList.add("show");
  setTimeout(()=>$("#f-title").focus(),50);
}
function closeModal(){ scrim.classList.remove("show"); }
$("#addBtn").onclick=openModal;
$("#closeM").onclick=closeModal; $("#cancelM").onclick=closeModal;
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&scrim.classList.contains("show")) closeModal(); });

form.addEventListener("submit",e=>{
  e.preventDefault();
  const m={
    id:uid(),
    title:$("#f-title").value.trim(),
    div:form.div.value,
    dt:`${$("#f-date").value}T${$("#f-time").value}`,
    att:$("#f-att").value.trim(),
    notes:$("#f-notes").value.trim()
  };
  meetings.push(m);
  persist();
  openIds.add(m.id);
  filter="all";
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected", x.dataset.div==="all"));
  closeModal();
  render();
  toast("Встреча добавлена · план сформирован");
});

/* ============ Clock + minute tick ============ */
function tickClock(){
  const n=new Date();
  $("#clkTime").textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  $("#clkDate").textContent=`${RU_DAYS[n.getDay()]}, ${n.getDate()} ${RU_MON[n.getMonth()]}`;
}
setInterval(tickClock,1000); tickClock();

// recompute countdowns every minute, aligned to minute boundary
function scheduleMinute(){
  const now=new Date();
  const ms=(60-now.getSeconds())*1000 - now.getMilliseconds();
  setTimeout(()=>{ render(); setInterval(render,60000); }, ms);
}

/* ============ Boot ============ */
(function init(){
  if(store.seeded()){ meetings=store.load()||[]; }
  else { meetings=seed(); persist(); }
  render();
  scheduleMinute();
})();
</script>
