<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ · Бриф к встрече</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ec;--panel:#fbfaf6;--ink:#1a1d21;--ink-soft:#4c5258;--ink-mute:#878d92;
    --line:#e2ddd1;--line-strong:#cfc8b8;--gm:#b85c38;--alm:#1f7a6e;
    --crit:#c1352b;--crit-soft:#f6e0de;
    --sans:'Inter',system-ui,sans-serif;--disp:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
  .box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(26,29,33,.05),0 18px 50px rgba(26,29,33,.1);padding:32px 30px;position:relative;overflow:hidden}
  .box::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gm),var(--alm))}
  .lock{width:46px;height:46px;border-radius:12px;background:#14171c;display:flex;align-items:center;justify-content:center;color:#eceae3;margin-bottom:18px}
  h1{font-family:var(--disp);font-weight:700;font-size:21px;margin:0 0 6px;letter-spacing:-.2px}
  p.sub{font-size:13.5px;color:var(--ink-soft);margin:0 0 22px}
  label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px}
  .row{display:flex;gap:8px}
  input{flex:1;font-family:var(--sans);font-size:15px;color:var(--ink);border:1px solid var(--line-strong);border-radius:10px;padding:12px 13px;background:#fff;width:100%;transition:border-color .15s,box-shadow .15s}
  input:focus{outline:0;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,29,33,.08)}
  button{font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;border:0;border-radius:10px;padding:0 16px;background:var(--ink);color:#fff;transition:filter .15s}
  button:hover{filter:brightness(1.18)}
  button:disabled{opacity:.5;cursor:default}
  .err{display:none;font-size:13px;color:var(--crit);background:var(--crit-soft);border:1px solid #eebcb8;border-radius:9px;padding:9px 12px;margin-top:14px}
  .err.show{display:block}
  .foot{margin-top:20px;font-size:11.5px;color:var(--ink-mute);line-height:1.5}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <form class="box" id="gate">
    <div class="lock">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h1>Защищённый доступ</h1>
    <p class="sub">Бриф к встрече с контрагентом. Введите пароль для просмотра.</p>
    <label for="pw">Пароль</label>
    <div class="row">
      <input id="pw" type="password" autocomplete="current-password" autofocus placeholder="••••••••">
      <button type="submit" id="go">Войти</button>
    </div>
    <div class="err" id="err">Неверный пароль. Попробуйте ещё раз.</div>
    <div class="foot">Содержимое зашифровано (AES-256) и расшифровывается только в вашем браузере после ввода пароля.</div>
  </form>

var SS_KEY="cb_brief_pw";

async function decrypt(pw){
  var raw=Uint8Array.from(atob(CIPHER),function(c){return c.charCodeAt(0);});
  // openssl формат: "Salted__"(8) + salt(8) + ciphertext
  var salt=raw.slice(8,16), data=raw.slice(16);
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  var bits=new Uint8Array(await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},km,48*8));
  var key=await crypto.subtle.importKey("raw",bits.slice(0,32),{name:"AES-CBC"},false,["decrypt"]);
  var iv=bits.slice(32,48);
  var plain=await crypto.subtle.decrypt({name:"AES-CBC",iv:iv},key,data);
  return new TextDecoder().decode(plain);
}

function reveal(html){
  document.open(); document.write(html); document.close();
}

async function tryPw(pw,fromStore){
  try{
    var html=await decrypt(pw);
    try{ sessionStorage.setItem(SS_KEY,pw); }catch(e){}
    reveal(html);
    return true;
  }catch(e){
    if(fromStore){ try{ sessionStorage.removeItem(SS_KEY); }catch(_){ } return false; }
    var el=document.getElementById("err"); el.classList.add("show");
    var inp=document.getElementById("pw"); inp.value=""; inp.focus();
    return false;
  }
}

document.getElementById("gate").addEventListener("submit",function(e){
  e.preventDefault();
  document.getElementById("err").classList.remove("show");
  var pw=document.getElementById("pw").value;
  if(pw) tryPw(pw,false);
});

// автоматический вход в рамках текущей вкладки, если пароль уже вводили
(function(){
  try{ var saved=sessionStorage.getItem(SS_KEY); if(saved) tryPw(saved,true); }catch(e){}
})();
